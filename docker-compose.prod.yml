# Production-like compose: no source mounts, healthchecks, NODE_ENV=production.
# Run with: docker compose -f docker-compose.prod.yml up -d

services:
  web:
    restart: always
    build: ./web
    image: clicktracker-web:latest
    ports:
      - 33128:3000
    env_file:
      - ./web/.env
    environment:
      - NODE_ENV=production
    volumes:
      - ./assets:/usr/src/app/assets
      - ./api_logs:/usr/src/app/logs
    networks:
      - internal_clicktracker_net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    restart: always
    build: ./api
    image: clicktracker-api:latest
    ports:
      - 33124:3000
    env_file:
      - ./api/.env
    volumes:
      - ./assets:/app/assets
      - ./api_logs:/app/logs
    networks:
      - internal_clicktracker_net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    restart: always
    image: redis/redis-stack
    volumes:
      - ./redis:/data
    networks:
      - internal_clicktracker_net

  postgres:
    user: '1000:1000'
    restart: always
    image: postgres:latest
    volumes:
      - ./postgres_data:/var/lib/postgresql/18/docker
    env_file:
      - ./web/.env
    networks:
      - internal_clicktracker_net

  pgadmin:
    restart: always
    image: dpage/pgadmin4:latest
    env_file:
      - ./web/.env
    ports:
      - "0.0.0.0:33126:443"
      - "0.0.0.0:33125:80"
    volumes:
      - ./pgadmin:/var/lib/pgadmin
    networks:
      - internal_clicktracker_net

networks:
  internal_clicktracker_net:
    driver: bridge
