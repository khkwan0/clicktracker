# Deploy to production after CI passes. No container registry: server pulls repo and builds.
# Required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY. Optional: DEPLOY_REPO_PATH.
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            REPO_PATH="${{ secrets.DEPLOY_REPO_PATH }}"
            cd "${REPO_PATH:-/opt/clicktracker}"
            git fetch origin master
            git reset --hard origin/master
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml image prune -f