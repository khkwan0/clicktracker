name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  web:
    name: Web (lint, build, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2 # Added @v2 to fix your error
        with:
          bun-version: latest

      # Add this block for automatic caching
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint .

      - name: Build
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: 1

      - name: Security audit
        run: bun audit --audit-level=high
        continue-on-error: true
  api:
    name: API (build, vet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...
