name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  web:
    name: Web (lint, build, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint .

      - name: Build
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: 1

      - name: Security audit
        run: bun audit --audit-level=high
        continue-on-error: true

  api:
    name: API (build, vet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...
